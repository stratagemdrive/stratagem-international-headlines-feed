name: Build headlines.json

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours, at minute 0
  workflow_dispatch:       # lets you run it manually too

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug - show files
        run: |
          pwd
          ls -la
          echo "---- scripts ----"
          ls -la scripts || true
          echo "---- public ----"
          ls -la public || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build headlines.json
        run: |
          python scripts/build_headlines_json.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/headlines.json
          git diff --cached --quiet || git commit -m "Update headlines.json"
          git push
